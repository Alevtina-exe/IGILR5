services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grand_cinema
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema_user -d grand_cinema"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-local-dev-key
      - ALLOWED_HOSTS=localhost,127.0.0.1,*
      - DATABASE_URL=postgres://cinema_user:cinema_pass@db:5432/grand_cinema
      - CSRF_TRUSTED_ORIGINS=http://localhost:8000
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume: