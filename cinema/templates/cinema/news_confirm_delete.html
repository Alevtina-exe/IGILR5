{% extends 'cinema/base.html' %}
{% block content %}
<h2>Удаление статьи</h2>
<p>Вы уверены, что хотите безвозвратно удалить новость <strong>"{{ article.title }}"</strong>?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" style="background:#dc3545; color:white; padding:10px 20px; border:none; cursor:pointer; font-weight:bold; margin-right:15px;">Да, удалить</button>
    <a href="{% url 'index' %}" style="color:#666; text-decoration:none;">Отмена</a>
</form>
{% endblock %}
