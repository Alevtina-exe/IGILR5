{% extends 'cinema/base.html' %}
{% block content %}
<div style="max-width: 800px; margin: 0 auto; padding: 20px;">
    <h2 style="text-align: center; margin-bottom: 30px;">Часто задаваемые вопросы</h2>
    
    <div style="display: flex; flex-direction: column; gap: 15px;">
        {% for faq in faqs %}
            <details style="background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px 20px;">
                <summary style="font-weight: bold; font-size: 16px; cursor: pointer; color: #333;">{{ faq.question }}</summary>
                <p style="margin-top: 10px; color: #555; line-height: 1.6;">{{ faq.answer }}</p>
            </details>
        {% empty %}
            <p style="text-align: center; color: #777;">Вопросов пока нет.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
