{% extends 'cinema/base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2 style="text-align: center; margin-top: 0; color: #333; margin-bottom: 25px;">Вход в аккаунт</h2>

    <form method="post" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px;">{{ field.label }}:</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color: red; font-size: 12px; margin: 5px 0 0 0;">{{ field.errors.as_text }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" style="background: #007bff; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px;">
            Войти
        </button>
    </form>

    <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #666;">
        Ещё нет аккаунта? <a href="{% url 'register' %}" style="color: #007bff; font-weight: bold; text-decoration: none;">Зарегистрироваться</a>
    </p>
</div>

<style>
    form input[type="text"], form input[type="password"] {
        width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box;
    }
</style>
{% endblock %}
